name: sickandflutter
description: "石斛幼苗智能培育管理平台 Flutter 前端"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  image_picker:
    path: third_party/openharmony/image_picker/image_picker
  json_annotation: ^4.11.0
  package_info_plus: ^9.0.0
  shared_preferences:
    path: third_party/openharmony/shared_preferences/shared_preferences

dev_dependencies:
  build_runner: ^2.5.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.11.1

dependency_overrides:
  image_picker_ohos:
    path: third_party/openharmony/image_picker/image_picker_ohos
  shared_preferences_ohos:
    path: third_party/openharmony/shared_preferences/shared_preferences_ohos

flutter:
  uses-material-design: true
