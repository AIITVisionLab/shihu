name: 发布安装包

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "发布标签，例如 v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.41.4

jobs:
  prepare:
    name: 准备发布信息
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      build_name: ${{ steps.meta.outputs.build_name }}
      build_number: ${{ steps.meta.outputs.build_number }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 解析标签与版本
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          version_line="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          build_name="${version_line%%+*}"
          build_number="${version_line##*+}"

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=斛生 ${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "build_name=${build_name}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${build_number}" >> "${GITHUB_OUTPUT}"

  build_linux_android_web:
    name: 构建 Android / Linux / Web
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 安装 Linux 构建依赖
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libgtk-3-dev \
            libjsoncpp-dev \
            liblzma-dev \
            libsecret-1-dev \
            ninja-build \
            pkg-config

      - name: 安装 Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none --depth 1 --branch "${FLUTTER_VERSION}" \
            https://github.com/flutter/flutter.git "${RUNNER_TEMP}/flutter"
          echo "${RUNNER_TEMP}/flutter/bin" >> "${GITHUB_PATH}"

      - name: 拉取 Flutter 依赖
        shell: bash
        run: |
          set -euo pipefail
          flutter config --no-analytics
          flutter config --enable-web
          flutter config --enable-linux-desktop
          flutter pub get

      - name: 构建 Android APK
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk --release \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 构建 Android App Bundle
        shell: bash
        run: |
          set -euo pipefail
          flutter build appbundle --release \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 构建 Linux 安装包目录
        shell: bash
        run: |
          set -euo pipefail
          flutter build linux --release \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 构建 Web 发布目录
        shell: bash
        run: |
          set -euo pipefail
          flutter build web --release \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 整理 Ubuntu 平台产物
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist stage/sickandflutter-linux-x64-release stage/sickandflutter-web

          cp build/app/outputs/flutter-apk/app-release.apk \
            dist/sickandflutter-android-release.apk
          cp build/app/outputs/bundle/release/app-release.aab \
            dist/sickandflutter-android-release.aab

          cp -R build/linux/x64/release/bundle/. stage/sickandflutter-linux-x64-release/
          tar -C stage -czf dist/sickandflutter-linux-x64-release.tar.gz \
            sickandflutter-linux-x64-release

          cp -R build/web/. stage/sickandflutter-web/
          tar -C stage -czf dist/sickandflutter-web.tar.gz sickandflutter-web

          ls -lh dist

      - name: 上传 Ubuntu 平台产物
        uses: actions/upload-artifact@v4
        with:
          name: release-ubuntu
          path: dist/*
          if-no-files-found: error

  build_windows:
    name: 构建 Windows
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none --depth 1 --branch "${FLUTTER_VERSION}" \
            https://github.com/flutter/flutter.git "${RUNNER_TEMP}/flutter"
          echo "${RUNNER_TEMP}/flutter/bin" >> "${GITHUB_PATH}"

      - name: 拉取 Flutter 依赖
        shell: bash
        run: |
          set -euo pipefail
          flutter config --no-analytics
          flutter config --enable-windows-desktop
          flutter pub get

      - name: 构建 Windows 发布目录
        shell: bash
        run: |
          set -euo pipefail
          flutter build windows --release \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 整理 Windows 平台产物
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          Copy-Item -Recurse -Force build/windows/x64/runner/Release stage/sickandflutter-windows-x64-release
          Compress-Archive -Path stage/sickandflutter-windows-x64-release -DestinationPath dist/sickandflutter-windows-x64-release.zip -Force
          Get-ChildItem dist

      - name: 上传 Windows 平台产物
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/*
          if-no-files-found: error

  build_apple:
    name: 构建 macOS / iOS
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none --depth 1 --branch "${FLUTTER_VERSION}" \
            https://github.com/flutter/flutter.git "${RUNNER_TEMP}/flutter"
          echo "${RUNNER_TEMP}/flutter/bin" >> "${GITHUB_PATH}"

      - name: 拉取 Flutter 依赖
        shell: bash
        run: |
          set -euo pipefail
          flutter config --no-analytics
          flutter config --enable-ios
          flutter config --enable-macos-desktop
          flutter pub get

      - name: 构建 macOS 应用
        shell: bash
        run: |
          set -euo pipefail
          flutter build macos --release \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 构建 iOS 未签名应用
        shell: bash
        run: |
          set -euo pipefail
          flutter build ios --release --no-codesign \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 整理 Apple 平台产物
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/sickandflutter.app \
            dist/sickandflutter-macos-release.zip

          ditto -c -k --sequesterRsrc --keepParent \
            build/ios/iphoneos/Runner.app \
            dist/sickandflutter-ios-unsigned-runner.app.zip

          ls -lh dist

      - name: 上传 Apple 平台产物
        uses: actions/upload-artifact@v4
        with:
          name: release-apple
          path: dist/*
          if-no-files-found: error

  build_ohos:
    name: 构建 OpenHarmony / 鸿蒙
    if: ${{ vars.ENABLE_OHOS_RELEASE == 'true' }}
    runs-on:
      - self-hosted
      - linux
      - ohos
    needs: prepare
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 OHOS 环境变量
        shell: bash
        env:
          FLUTTER_OHOS_HOME: ${{ vars.FLUTTER_OHOS_HOME }}
          OHOS_SDK_HOME: ${{ vars.OHOS_SDK_HOME }}
        run: |
          set -euo pipefail

          if [[ -z "${FLUTTER_OHOS_HOME}" ]]; then
            echo "仓库变量 FLUTTER_OHOS_HOME 未配置。" >&2
            exit 1
          fi

          if [[ -z "${OHOS_SDK_HOME}" ]]; then
            echo "仓库变量 OHOS_SDK_HOME 未配置。" >&2
            exit 1
          fi

      - name: 写入 OHOS 本地配置
        shell: bash
        env:
          FLUTTER_OHOS_HOME: ${{ vars.FLUTTER_OHOS_HOME }}
          OHOS_SDK_HOME: ${{ vars.OHOS_SDK_HOME }}
        run: |
          set -euo pipefail

          rm -rf ohos/node_modules ohos/package-lock.json

          cat > ohos/local.properties <<EOF
          hwsdk.dir=${OHOS_SDK_HOME}
          flutter.sdk=${FLUTTER_OHOS_HOME}
          flutter.versionName=${{ needs.prepare.outputs.build_name }}
          flutter.versionCode=${{ needs.prepare.outputs.build_number }}
          EOF

          cat > ohos/package.json <<EOF
          {
            "dependencies": {
              "flutter-hvigor-plugin": "file:${FLUTTER_OHOS_HOME}/packages/flutter_tools/hvigor"
            }
          }
          EOF

      - name: 构建 HAP
        shell: bash
        env:
          FLUTTER_OHOS_HOME: ${{ vars.FLUTTER_OHOS_HOME }}
        run: |
          set -euo pipefail
          export PATH="${FLUTTER_OHOS_HOME}/bin:${PATH}"

          flutter config --no-analytics
          flutter pub get
          flutter build hap --release

      - name: 整理 OHOS 平台产物
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          hap_path="$(find build ohos -type f -name '*.hap' | head -n 1)"
          if [[ -z "${hap_path}" ]]; then
            echo "未找到 HAP 产物。" >&2
            exit 1
          fi

          cp "${hap_path}" dist/sickandflutter-ohos-release.hap
          ls -lh dist

      - name: 上传 OHOS 平台产物
        uses: actions/upload-artifact@v4
        with:
          name: release-ohos
          path: dist/*
          if-no-files-found: error

  release:
    name: 上传到 GitHub Release
    if: ${{ always() && !cancelled() && !contains(join(needs.*.result, ','), 'failure') }}
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_linux_android_web
      - build_windows
      - build_apple
      - build_ohos
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: package
          pattern: release-*
          merge-multiple: true

      - name: 生成发布清单
        shell: bash
        run: |
          set -euo pipefail
          chmod +x tool/generate_release_manifest.sh
          tool/generate_release_manifest.sh package "${{ needs.prepare.outputs.release_tag }}"
          ls -lh package

      - name: 生成 Release 说明
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/release-notes.md" <<EOF
          ${RELEASE_TAG} 自动构建产物

          包含内容：

          - Android APK 与 AAB
          - Linux 桌面端压缩包
          - Windows 桌面端压缩包
          - macOS 应用压缩包
          - Web 静态资源压缩包
          - iOS 未签名 Runner.app 压缩包

          说明：

          - iOS 产物为未签名应用，仅用于二次签名、内测分发或后续导出。
          - macOS 产物未做 notarization，如需正式分发请继续补签名与公证。
          - OpenHarmony / 鸿蒙 产物仅在启用自托管 runner 且工具链可用时一并上传。
          - \`SHA256SUMS\` 可用于分发前校验文件完整性。
          EOF

      - name: 创建或更新 GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" package/* --clobber
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${RUNNER_TEMP}/release-notes.md"
          else
            gh release create "${RELEASE_TAG}" package/* \
              --title "${RELEASE_NAME}" \
              --notes-file "${RUNNER_TEMP}/release-notes.md" \
              --target "${GITHUB_SHA}"
          fi
