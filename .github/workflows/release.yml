name: 发布安装包

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "发布标签，例如 v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.41.4

jobs:
  prepare:
    name: 准备发布信息
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      build_name: ${{ steps.meta.outputs.build_name }}
      build_number: ${{ steps.meta.outputs.build_number }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 解析标签与版本
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          version_line="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          build_name="${version_line%%+*}"
          build_number="${version_line##*+}"

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=斛生 ${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "build_name=${build_name}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${build_number}" >> "${GITHUB_OUTPUT}"

  build_android:
    name: 构建 Android 安装包
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 安装 Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none --depth 1 --branch "${FLUTTER_VERSION}" \
            https://github.com/flutter/flutter.git "${RUNNER_TEMP}/flutter"
          echo "${RUNNER_TEMP}/flutter/bin" >> "${GITHUB_PATH}"

      - name: 拉取 Flutter 依赖
        shell: bash
        run: |
          set -euo pipefail
          flutter config --no-analytics
          flutter pub get

      - name: 构建 Android 多架构 APK
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk --release --split-per-abi \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 整理 Android 安装包
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "dist/斛生-android-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            "dist/斛生-android-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
            "dist/斛生-android-x86_64.apk"

          ls -lh dist

      - name: 上传 Android 安装包
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: dist/*
          if-no-files-found: error

  build_linux:
    name: 构建 Linux 安装包
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            flutter_target_platform: linux-x64
            build_arch: x64
            deb_arch: amd64
            rpm_arch: x86_64
            asset_name: 斛生-linux-x64.deb
          - runner: ubuntu-24.04-arm
            flutter_target_platform: linux-arm64
            build_arch: arm64
            deb_arch: arm64
            rpm_arch: aarch64
            asset_name: 斛生-linux-arm64.deb
    runs-on: ${{ matrix.runner }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 安装 Linux 构建依赖
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            dpkg-dev \
            fakeroot \
            libgtk-3-dev \
            libjsoncpp-dev \
            liblzma-dev \
            libsecret-1-dev \
            ninja-build \
            patchelf \
            pkg-config \
            rpm \
            squashfs-tools \
            zstd

      - name: 安装 Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none --depth 1 --branch "${FLUTTER_VERSION}" \
            https://github.com/flutter/flutter.git "${RUNNER_TEMP}/flutter"
          echo "${RUNNER_TEMP}/flutter/bin" >> "${GITHUB_PATH}"

      - name: 拉取 Flutter 依赖
        shell: bash
        run: |
          set -euo pipefail
          flutter config --no-analytics
          flutter config --enable-linux-desktop
          flutter pub get

      - name: 构建 Linux 发布目录
        shell: bash
        run: |
          set -euo pipefail
          flutter build linux --release \
            --target-platform "${{ matrix.flutter_target_platform }}" \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 生成 Linux 安装包
        shell: bash
        run: |
          set -euo pipefail
          chmod +x tool/package_linux_deb.sh
          chmod +x tool/package_linux_common.sh
          chmod +x tool/package_linux_appimage.sh
          chmod +x tool/package_linux_pacman.sh
          chmod +x tool/package_linux_rpm.sh
          chmod +x tool/package_linux_portable.sh
          mkdir -p dist
          tool/package_linux_deb.sh \
            "build/linux/${{ matrix.build_arch }}/release/bundle" \
            "dist/${{ matrix.asset_name }}" \
            "${{ needs.prepare.outputs.build_name }}" \
            "${{ matrix.deb_arch }}"
          tool/package_linux_rpm.sh \
            "build/linux/${{ matrix.build_arch }}/release/bundle" \
            "dist/斛生-linux-${{ matrix.build_arch }}.rpm" \
            "${{ needs.prepare.outputs.build_name }}" \
            "${{ matrix.rpm_arch }}"
          tool/package_linux_pacman.sh \
            "build/linux/${{ matrix.build_arch }}/release/bundle" \
            "dist/斛生-linux-${{ matrix.build_arch }}.pkg.tar.zst" \
            "${{ needs.prepare.outputs.build_name }}" \
            "1" \
            "${{ matrix.rpm_arch }}"
          tool/package_linux_appimage.sh \
            "build/linux/${{ matrix.build_arch }}/release/bundle" \
            "dist/斛生-linux-${{ matrix.build_arch }}.AppImage" \
            "${{ matrix.rpm_arch }}"
          tool/package_linux_portable.sh \
            "build/linux/${{ matrix.build_arch }}/release/bundle" \
            "dist/斛生-linux-${{ matrix.build_arch }}-portable.tar.gz" \
            "husheng-linux-${{ matrix.build_arch }}-portable"

      - name: 上传 Linux 安装包
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.build_arch }}
          path: dist/*
          if-no-files-found: error

  build_windows:
    name: 构建 Windows 安装包
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            build_arch: x64
            asset_name: 斛生-windows-x64-setup.exe
          - runner: windows-11-arm
            build_arch: arm64
            asset_name: 斛生-windows-arm64-setup.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none --depth 1 --branch "${FLUTTER_VERSION}" \
            https://github.com/flutter/flutter.git "${RUNNER_TEMP}/flutter"
          echo "${RUNNER_TEMP}/flutter/bin" >> "${GITHUB_PATH}"

      - name: 拉取 Flutter 依赖
        shell: bash
        run: |
          set -euo pipefail
          flutter config --no-analytics
          flutter config --enable-windows-desktop
          flutter pub get

      - name: 构建 Windows 发布目录
        shell: bash
        run: |
          set -euo pipefail
          flutter build windows --release \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 安装 Inno Setup
        shell: pwsh
        run: |
          $installerPath = Join-Path $env:RUNNER_TEMP "innosetup-latest.exe"
          Invoke-WebRequest "https://jrsoftware.org/download.php/is.exe?dontcount=1" -OutFile $installerPath

          Start-Process `
            -FilePath $installerPath `
            -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-" `
            -Wait

          $isccPath = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path -LiteralPath $isccPath)) {
            $isccPath = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }

          if (-not (Test-Path -LiteralPath $isccPath)) {
            throw "Inno Setup 安装完成后未找到 ISCC.exe。"
          }

          $versionInfo = (Get-Item -LiteralPath $isccPath).VersionInfo
          Write-Host "Using Inno Setup: $($versionInfo.ProductVersion)"

      - name: 生成 Windows 安装器
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          ./tool/package_windows_installer.ps1 `
            -BuildDir "build/windows/${{ matrix.build_arch }}/runner/Release" `
            -OutputFile "dist/${{ matrix.asset_name }}" `
            -Version "${{ needs.prepare.outputs.build_name }}" `
            -Architecture "${{ matrix.build_arch }}"
          Get-ChildItem dist

      - name: 上传 Windows 安装包
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ matrix.build_arch }}
          path: dist/*
          if-no-files-found: error

  build_macos:
    name: 构建 macOS 安装包
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            build_arch: arm64
            asset_name: 斛生-macos-arm64.dmg
          - runner: macos-15-intel
            build_arch: x64
            asset_name: 斛生-macos-x64.dmg
    runs-on: ${{ matrix.runner }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none --depth 1 --branch "${FLUTTER_VERSION}" \
            https://github.com/flutter/flutter.git "${RUNNER_TEMP}/flutter"
          echo "${RUNNER_TEMP}/flutter/bin" >> "${GITHUB_PATH}"

      - name: 拉取 Flutter 依赖
        shell: bash
        run: |
          set -euo pipefail
          flutter config --no-analytics
          flutter config --enable-macos-desktop
          flutter pub get

      - name: 构建 macOS 应用
        shell: bash
        run: |
          set -euo pipefail
          flutter build macos --release \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 生成 macOS dmg 安装包
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          chmod +x tool/package_macos_dmg.sh
          tool/package_macos_dmg.sh \
            "build/macos/Build/Products/Release/husheng.app" \
            "dist/${{ matrix.asset_name }}"
          ls -lh dist

      - name: 上传 macOS 安装包
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.build_arch }}
          path: dist/*
          if-no-files-found: error

  build_ios:
    name: 构建 iOS 安装包
    needs: prepare
    runs-on: macos-15
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none --depth 1 --branch "${FLUTTER_VERSION}" \
            https://github.com/flutter/flutter.git "${RUNNER_TEMP}/flutter"
          echo "${RUNNER_TEMP}/flutter/bin" >> "${GITHUB_PATH}"

      - name: 拉取 Flutter 依赖
        shell: bash
        run: |
          set -euo pipefail
          flutter config --no-analytics
          flutter config --enable-ios
          flutter pub get

      - name: 构建未签名 iOS 应用
        shell: bash
        run: |
          set -euo pipefail
          flutter build ios --release --no-codesign \
            --build-name "${{ needs.prepare.outputs.build_name }}" \
            --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: 生成未签名 IPA 安装包
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          chmod +x tool/package_ios_ipa.sh

          app_path="$(find build/ios/iphoneos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [[ -z "${app_path}" ]]; then
            echo "未找到 iOS .app 产物。" >&2
            exit 1
          fi

          tool/package_ios_ipa.sh \
            "${app_path}" \
            "dist/斛生-ios-unsigned.ipa"
          ls -lh dist

      - name: 上传 iOS 安装包
        uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: dist/*
          if-no-files-found: error

  build_ohos:
    name: 构建 OpenHarmony / 鸿蒙 安装包
    if: ${{ vars.ENABLE_OHOS_RELEASE == 'true' }}
    runs-on:
      - self-hosted
      - linux
      - ohos
    needs: prepare
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 OHOS 环境变量
        shell: bash
        env:
          FLUTTER_OHOS_HOME: ${{ vars.FLUTTER_OHOS_HOME }}
          OHOS_SDK_HOME: ${{ vars.OHOS_SDK_HOME }}
        run: |
          set -euo pipefail

          if [[ -z "${FLUTTER_OHOS_HOME}" ]]; then
            echo "仓库变量 FLUTTER_OHOS_HOME 未配置。" >&2
            exit 1
          fi

          if [[ -z "${OHOS_SDK_HOME}" ]]; then
            echo "仓库变量 OHOS_SDK_HOME 未配置。" >&2
            exit 1
          fi

      - name: 写入 OHOS 本地配置
        shell: bash
        env:
          FLUTTER_OHOS_HOME: ${{ vars.FLUTTER_OHOS_HOME }}
          OHOS_SDK_HOME: ${{ vars.OHOS_SDK_HOME }}
        run: |
          set -euo pipefail

          rm -rf ohos/node_modules ohos/package-lock.json

          cat > ohos/local.properties <<EOF
          hwsdk.dir=${OHOS_SDK_HOME}
          flutter.sdk=${FLUTTER_OHOS_HOME}
          flutter.versionName=${{ needs.prepare.outputs.build_name }}
          flutter.versionCode=${{ needs.prepare.outputs.build_number }}
          EOF

          cat > ohos/package.json <<EOF
          {
            "dependencies": {
              "flutter-hvigor-plugin": "file:${FLUTTER_OHOS_HOME}/packages/flutter_tools/hvigor"
            }
          }
          EOF

      - name: 构建 HAP
        shell: bash
        env:
          FLUTTER_OHOS_HOME: ${{ vars.FLUTTER_OHOS_HOME }}
        run: |
          set -euo pipefail
          export PATH="${FLUTTER_OHOS_HOME}/bin:${PATH}"

          flutter config --no-analytics
          flutter pub get
          flutter build hap --release

      - name: 整理 OHOS 平台产物
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          hap_path="$(find build ohos -type f -name '*.hap' | head -n 1)"
          if [[ -z "${hap_path}" ]]; then
            echo "未找到 HAP 产物。" >&2
            exit 1
          fi

          cp "${hap_path}" "dist/斛生-ohos-arm64.hap"
          ls -lh dist

      - name: 上传 OHOS 安装包
        uses: actions/upload-artifact@v4
        with:
          name: release-ohos
          path: dist/*
          if-no-files-found: error

  release:
    name: 上传到 GitHub Release
    if: ${{ always() && !cancelled() && !contains(join(needs.*.result, ','), 'failure') }}
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_android
      - build_linux
      - build_windows
      - build_macos
      - build_ios
      - build_ohos
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: package
          pattern: release-*
          merge-multiple: true

      - name: 生成 Release 说明
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/release-notes.md" <<EOF
          ${RELEASE_TAG} 安装包发布

          当前 Release 仅包含安装包：

          - Android 按架构拆分 APK
          - Linux 按架构拆分 deb、rpm、pacman、AppImage 与便携二进制包
          - Windows 按架构拆分安装器
          - macOS 按架构拆分 dmg
          - iOS 未签名 IPA
          - OpenHarmony / 鸿蒙 HAP（仅在自托管 runner 启用时提供）

          说明：

          - 不再上传 Web 静态资源、AAB 和校验说明文件。
          - iOS 当前提供未签名 IPA，如需直接安装到真机，请按你的分发流程重新签名。
          - macOS dmg 当前未做 notarization，如需正式分发请继续补签名与公证。
          EOF

      - name: 创建或更新 GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' | while read -r asset_name; do
              if [[ -n "${asset_name}" ]]; then
                gh release delete-asset "${RELEASE_TAG}" "${asset_name}" --yes
              fi
            done
            gh release upload "${RELEASE_TAG}" package/* --clobber
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${RUNNER_TEMP}/release-notes.md"
          else
            gh release create "${RELEASE_TAG}" package/* \
              --title "${RELEASE_NAME}" \
              --notes-file "${RUNNER_TEMP}/release-notes.md" \
              --target "${GITHUB_SHA}"
          fi
