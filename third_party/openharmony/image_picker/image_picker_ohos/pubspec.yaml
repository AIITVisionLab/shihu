name: image_picker_ohos
description: Ohos implementation of the image_picker plugin.
repository: https://gitcode.com/openharmony-tpc/flutter_packages/tree/master/packages/image_picker/image_picker_ohos
issue_tracker: https://gitcode.com/openharmony-tpc/flutter_packages/issues

version: 0.8.13+7

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

flutter:
  plugin:
    implements: image_picker
    platforms:
      ohos:
        package: io.flutter.plugins.imagepicker
        pluginClass: ImagePickerPlugin
        dartPluginClass: ImagePickerOhos

dependencies:
  flutter:
    sdk: flutter
  flutter_plugin_android_lifecycle: ^2.0.1
  image_picker_platform_interface: ^2.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^24.2.0

  topics:
  - camera
  - image-picker
  - files
  - file-selection
