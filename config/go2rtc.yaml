# K230 -> RK3568 go2rtc -> WebRTC/MSE/HLS
# 说明：
# - 当前轻量级 v1 方案要求 K230 主码流为 H264。
# - 如果浏览器无法兼容音频，优先在 K230 侧关闭音频。
# - 当前公网候选地址已经固定为腾讯云公网 IP 101.35.79.76:8555。
# - 当前局域网源流地址初始值为 rtsp://172.18.8.103:8554/test。
# - edgelink-gateway 会根据 K230 /api/ai 的来源地址自动更新 streams.k230。

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  candidates:
    - "101.35.79.76:8555"

streams:
  k230:
    - "rtsp://172.18.8.103:8554/test"
