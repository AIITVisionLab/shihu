# K230 -> RK3568 go2rtc -> WebRTC/MSE/HLS
# 说明：
# - 当前轻量级 v1 方案要求 K230 主码流为 H264。
# - 如果浏览器无法兼容音频，优先在 K230 侧关闭音频。
# - 当前公网候选地址已经固定为腾讯云公网 IP 101.35.79.76:8555。
# - 把 K230_IP/STREAM_PATH 替换为实际 RTSP 地址。

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  candidates:
    - "101.35.79.76:8555"

streams:
  k230:
    - "rtsp://192.168.1.110:8554/test"